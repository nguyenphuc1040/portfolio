<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyen Huu Khac Phuc - Game Developer CV</title>
    <link rel="icon" href="assets/logo192.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="cv-style.css">
</head>

<body>
    <div class="cv-container" id="cv-root"></div>

    <div class="print-hint no-print">
        <p><i class="fas fa-print"></i> Press <strong>Ctrl + P</strong> to save as PDF. Set margins to
            <strong>None</strong> for best results.
        </p>
    </div>

    <script src="cv-data.js"></script>
    <script>
        function renderCV(d) {
            const c = d.contact;
            let html = '';

            // Header
            html += `
            <header class="cv-header">
                <div class="header-main">
                    <div class="header-text">
                        <h1>${d.name}</h1>
                        <p class="title-role">${d.role}</p>
                    </div>
                    <img src="${d.avatar}" alt="Avatar" class="cv-avatar">
                </div>
                <div class="header-contact">
                    <div class="contact-row">
                        <span><i class="fas fa-birthday-cake"></i> ${c.birthday}</span>
                        <a href="mailto:${c.email}"><i class="fas fa-envelope"></i> ${c.email}</a>
                        <a href="tel:${c.phone.replace(/\s/g, '')}"><i class="fas fa-phone"></i> ${c.phone}</a>
                        <a href="${c.portfolio}" target="_blank"><i class="fas fa-globe"></i> Portfolio</a>
                    </div>
                    <div class="contact-row">
                        <span><i class="fas fa-map-marker-alt"></i> ${c.location}</span>
                        <a href="https://${c.github}" target="_blank"><i class="fab fa-github"></i> ${c.github}</a>
                        <a href="https://${c.linkedin}" target="_blank"><i class="fab fa-linkedin"></i> ${c.linkedin}</a>
                    </div>
                </div>
            </header>`;

            // Summary
            html += `
            <section class="cv-section">
                <h2><i class="fas fa-user"></i> Summary</h2>
                <p class="summary-text">${d.summary}</p>
            </section>`;

            // Skills
            html += `
            <section class="cv-section">
                <h2><i class="fas fa-code"></i> Technical Skills</h2>
                <div class="skills-grid">
                    ${Object.entries(d.skills).map(([cat, items]) => `
                    <div class="skill-category">
                        <h4>${cat}</h4>
                        ${items.map(s => `<span>${s}</span>`).join('')}
                    </div>`).join('')}
                </div>
            </section>`;

            // Work Experience
            html += `
            <section class="cv-section">
                <h2><i class="fas fa-briefcase"></i> Work Experience</h2>
                ${d.experience.map(e => `
                <div class="experience-item">
                    <div class="exp-header">
                        <div>
                            <h3>${e.title}</h3>
                            <span class="company">${e.company}</span>
                        </div>
                        <span class="date">${e.date}</span>
                    </div>
                    <p class="exp-desc">${e.desc}</p>
                </div>`).join('')}
            </section>`;

            // Projects
            html += `
            <section class="cv-section">
                <h2><i class="fas fa-gamepad"></i> Projects</h2>
                ${d.projects.map(p => {
                    // Page break sentinel
                    if (p.pageBreak) {
                        return '<div class="project-item page-break"></div>';
                    }

                    let badges = `<span class="badge">${p.badge}</span>`;
                    if (p.award) badges = `<span class="badge award"><i class="fas fa-award"></i> ${p.award}</span>` + badges;
                    if (p.downloads) badges += `<span class="badge downloads">${p.downloads}</span>`;

                    let linksHtml = '';
                    if (p.links) {
                        linksHtml = '<div class="project-links">';
                        if (p.links.googlePlay) linksHtml += `<a href="${p.links.googlePlay}" target="_blank"><i class="fab fa-google-play"></i> Google Play</a>`;
                        if (p.links.appStore) linksHtml += `<a href="${p.links.appStore}" target="_blank"><i class="fab fa-apple"></i> App Store</a>`;
                        if (p.links.telegram) linksHtml += `<a href="${p.links.telegram}" target="_blank"><i class="fab fa-telegram"></i> Telegram</a>`;
                        if (p.links.meta) linksHtml += `<a href="${p.links.meta}" target="_blank"><i class="fas fa-vr-cardboard"></i> Meta Horizon</a>`;
                        linksHtml += '</div>';
                    }

                    return `
                <div class="project-item">
                    <div class="project-header">
                        <h3>${p.name} ${badges}</h3>
                        <span class="company-tag">${p.company}</span>
                    </div>
                    <p class="project-desc">${p.desc}</p>
                    <ul class="responsibilities">
                        ${p.responsibilities.map(r => `<li>${r}</li>`).join('')}
                    </ul>
                    <div class="tech-tags">
                        ${p.tech.map(t => `<span>${t}</span>`).join('')}
                    </div>
                    ${linksHtml}
                </div>`;
                }).join('')}
            </section>`;

            // Education
            html += `
            <section class="cv-section">
                <h2><i class="fas fa-graduation-cap"></i> Education</h2>
                <div class="experience-item">
                    <div class="exp-header">
                        <div>
                            <h3>${d.education.degree}</h3>
                            <span class="company">${d.education.school}</span>
                        </div>
                    </div>
                </div>
            </section>`;

            document.getElementById('cv-root').innerHTML = html;
        }

        renderCV(cvData);
    </script>
</body>

</html>
